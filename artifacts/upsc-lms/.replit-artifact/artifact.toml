kind = "web"
previewPath = "/"
title = "UPSC LMS"
version = "1.0.0"
id = "artifacts/upsc-lms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24552

[services.development]
run = "pnpm --filter @workspace/upsc-lms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/upsc-lms", "run", "build" ]
publicDir = "artifacts/upsc-lms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24552"
BASE_PATH = "/"
